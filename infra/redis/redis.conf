# Redis production configuration for knowledge-service cache
# Applied in production via docker-compose.prod.yml

# Memory limit — evict least-recently-used autocomplete cache entries first
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence — survive Redis restarts without losing warm cache
appendonly yes
appendfsync everysec

# RDB snapshots as a safety net
save 60 1
save 300 10
save 900 100

# Logging
loglevel notice
logfile ""

# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command DEBUG    ""
